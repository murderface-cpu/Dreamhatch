<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Dream Hatch Kenya">
  <defs>
    <linearGradient id="dh-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F0E2"/>
      <stop offset="1" stop-color="#E8C98A"/>
    </linearGradient>
    <linearGradient id="dh-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C05633"/>
      <stop offset="1" stop-color="#7A2E1B"/>
    </linearGradient>
    <linearGradient id="dh-sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E6B25A"/>
      <stop offset="1" stop-color="#B97A2A"/>
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="120" height="120" rx="22" fill="url(#dh-sky)"/>

  <!-- Sun rays -->
  <g stroke="#B97A2A" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <line x1="60" y1="14" x2="60" y2="22"/>
    <line x1="22" y1="30" x2="28" y2="35"/>
    <line x1="98" y1="30" x2="92" y2="35"/>
    <line x1="14" y1="60" x2="22" y2="60"/>
    <line x1="106" y1="60" x2="98" y2="60"/>
  </g>

  <!-- Sun (the "dream" rising) -->
  <circle cx="60" cy="60" r="22" fill="url(#dh-sun)"/>
  <circle cx="60" cy="60" r="22" fill="none" stroke="#7A4A12" stroke-width="1.5" opacity="0.35"/>

  <!-- Hatched ground / nest (the "hatch" — radiating lines) -->
  <g stroke="#3D2A1A" stroke-width="2" stroke-linecap="round">
    <line x1="18" y1="92" x2="102" y2="92"/>
    <line x1="24" y1="98" x2="96" y2="98"/>
    <line x1="30" y1="104" x2="90" y2="104"/>
  </g>

  <!-- Seedling/sprout from hatch — three leaves -->
  <g fill="#3E6A4E">
    <path d="M60 92 C60 80 52 76 50 70 C56 70 60 74 60 80 C60 74 64 70 70 70 C68 76 60 80 60 92 Z"/>
  </g>
  <line x1="60" y1="92" x2="60" y2="80" stroke="#3D2A1A" stroke-width="1.2" opacity="0.4"/>
</svg>
